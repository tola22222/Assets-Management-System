name: Deploy Laravel Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ams_app:latest

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/asset_management_app

            mkdir -p $APP_DIR/nginx

            # Write docker-compose.yml directly G�� no SCP needed
            cat > $APP_DIR/docker-compose.yml << 'EOF'
            services:
              app:
                image: toladev1/ams_app:latest
                container_name: ams_app
                restart: always
                env_file:
                  - .env
                volumes:
                  - storage_data:/var/www/storage
                  - app_public:/var/www/public
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - laravel_net

              nginx:
                image: nginx:alpine
                container_name: ams_nginx
                restart: always
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                  - app_public:/var/www/public
                  - storage_data:/var/www/storage
                depends_on:
                  - app
                networks:
                  - laravel_net

              db:
                image: mysql:8.0
                container_name: asset_management_db
                restart: always
                environment:
                  MYSQL_DATABASE: asset_management_db
                  MYSQL_USER: asset_management_user
                  MYSQL_PASSWORD: asset_management_pass
                  MYSQL_ROOT_PASSWORD: root_pass
                volumes:
                  - dbdata:/var/lib/mysql
                networks:
                  - laravel_net
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                  start_period: 30s

            networks:
              laravel_net:
                driver: bridge

            volumes:
              dbdata:
              storage_data:
              app_public:
            EOF

            # Write nginx/default.conf directly G�� no SCP needed
            cat > $APP_DIR/nginx/default.conf << 'EOF'
            server {
                listen 80;
                server_name _;

                root /var/www/public;
                index index.php index.html;

                location / {
                    try_files $uri $uri/ /index.php?$query_string;
                }

                location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_pass app:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_param PATH_INFO $fastcgi_path_info;
                }

                location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf)$ {
                    expires 30d;
                    access_log off;
                }

                location ~ /\.ht {
                    deny all;
                }
            }

            server {
                listen 80;
                server_name app.pepyasset.online;
                root /var/www/public;

                # API requests go straight to the Laravel app, same as the main site.
                location /api/ {
                    try_files $uri $uri/ /index.php?$query_string;
                }

                location ~ \.php$ {
                    include fastcgi_params;
                    fastcgi_pass app:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    fastcgi_param PATH_INFO $fastcgi_path_info;
                }

                # Everything else is the Vue3 SPA static build, with history-mode fallback.
                location / {
                    root /var/www/public/app;
                    try_files $uri $uri/ /index.html;
                }

                location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf)$ {
                    root /var/www/public/app;
                    expires 30d;
                    access_log off;
                }
            }
            EOF

            cd $APP_DIR

            if [ ! -f .env ]; then
              echo "${{ secrets.APP_ENV }}" > .env
            fi

            # Only pull app/nginx here so the pinned mysql image never changes
            # underneath a running db container on a routine deploy.
            docker compose pull app nginx

            # The app/nginx services share a named volume (app_public) mounted at
            # /var/www/public so nginx can serve static files without proxying
            # everything through PHP. Docker only seeds a named volume from the
            # image the FIRST time it's created — it does NOT resync on later
            # deploys, so every subsequent image update (new SPA build, new
            # favicon, etc.) was silently invisible in production while the
            # volume kept serving whatever was baked in on day one. Re-sync the
            # volume from the freshly pulled image before starting containers.
            echo "Syncing public/ assets from the new image into the shared volume..."
            PUBLIC_VOLUME=$(docker volume ls --filter name=app_public --format '{{.Name}}' | head -n1)
            if [ -n "$PUBLIC_VOLUME" ]; then
              docker run --rm -v "$PUBLIC_VOLUME":/target toladev1/ams_app:latest \
                sh -c "cp -a /var/www/public/. /target/ && chown -R www-data:www-data /target"
              echo "Synced into volume: $PUBLIC_VOLUME"
            else
              echo "No existing app_public volume found (first deploy) — image content will seed it normally."
            fi

            docker compose up -d --remove-orphans

            echo "Waiting for database to accept connections from the app container..."
            DB_READY=0
            for i in $(seq 1 30); do
              if docker compose exec -T app php -r "
                try { new PDO('mysql:host='.getenv('DB_HOST').';port='.getenv('DB_PORT'), getenv('DB_USERNAME'), getenv('DB_PASSWORD')); exit(0); }
                catch (Exception \$e) { fwrite(STDERR, \$e->getMessage().PHP_EOL); exit(1); }
              "; then
                echo "Database is reachable (attempt $i)."
                DB_READY=1
                break
              fi
              echo "Attempt $i/30: database not reachable yet, retrying in 3s..."
              sleep 3
            done

            if [ "$DB_READY" != "1" ]; then
              echo "Database still unreachable after 90s. Diagnostics:"
              docker compose ps
              echo "--- db health ---"
              docker inspect --format '{{json .State.Health}}' asset_management_db || true
              echo "--- db logs (last 100 lines) ---"
              docker logs asset_management_db --tail 100 || true
              exit 1
            fi

            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan migrate --force

            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan route:clear
            docker compose exec -T app php artisan view:clear

            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache

            echo "Deploy complete."
