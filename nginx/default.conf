server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    # ✅ Serve static assets directly from disk (favicons, images, css, js)
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf|map)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ✅ Everything else proxies to php built-in server on port 8080
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120;
    }

    # ✅ Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}