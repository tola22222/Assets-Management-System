services:
  app:
    image: toladev1/ams_app:latest
    container_name: ams_app
    restart: always
    command: php -S 0.0.0.0:8080 -t /var/www/public/
    volumes:
      - ./.env:/var/www/.env
      - storage_data:/var/www/storage
      # ✅ FIXED: bind mount instead of named volume so your actual
      #           public/ files (favicons, images, logo) are served.
      #           Named volume "app_public" was overwriting public/ with
      #           an empty volume and hiding all your assets.
      - ./public:/var/www/public
    depends_on:
      - db
    networks:
      - laravel_net

  nginx:
    image: nginx:alpine
    container_name: ams_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # ✅ FIXED: same bind mount so nginx reads the real public/ folder
      - ./public:/var/www/public
    depends_on:
      - app
    networks:
      - laravel_net

  db:
    image: mysql:8.0
    container_name: asset_management_db
    restart: always
    environment:
      MYSQL_DATABASE: asset_management_db
      MYSQL_USER: asset_management_user
      MYSQL_PASSWORD: asset_management_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel_net

networks:
  laravel_net:
    driver: bridge

volumes:
  dbdata:
  storage_data:
  # ✅ REMOVED: app_public named volume (was the root cause of 404s)