services:
  app:
    image: toladev1/ams_app:latest
    container_name: ams_app
    restart: always
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/storage
      - app_public:/var/www/public        # shared with nginx
    depends_on:
      - db
    networks:
      - laravel_net                        # fixed: was missing from nginx

  nginx:
    image: nginx:alpine
    container_name: ams_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/public        # fixed: shares public files from app
    depends_on:
      - app
    networks:
      - laravel_net                        # fixed: was "app-network", mismatched

  db:
    image: mysql:8.0
    container_name: asset_management_db
    restart: always
    environment:
      MYSQL_DATABASE: asset_management_db
      MYSQL_USER: asset_management_user
      MYSQL_PASSWORD: asset_management_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel_net

networks:
  laravel_net:
    driver: bridge

volumes:
  dbdata:
  storage_data:
  app_public: